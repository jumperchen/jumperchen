name: Language metrics
on:
  # Runs daily at 02:00 (Asia/Taipei)
  schedule: [{cron: "0 18 * * *"}]
  workflow_dispatch:

concurrency:
  group: language-metrics
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  languages:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: jumperchen
          filename: assets/github-languages.svg
          base: ""
          config_timezone: Asia/Taipei
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_ignored: faust
          plugin_languages_skipped: ntut-aiot
          plugin_languages_indepth_custom: zkoss/zk, zkoss/zkspreadsheet
          plugin_languages_analysis_timeout: 60
          plugin_languages_analysis_timeout_repositories: 15
          commits_authoring: jumperchen, jumperchen@potix.com, jumperchen@gmail.com

      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update total stats banner
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          set -e
          git pull --rebase
          Q='{"query":"{ user(login: \"jumperchen\") { followers { totalCount } pullRequests { totalCount } closedIssues: issues(states: CLOSED) { totalCount } repositories(ownerAffiliations: OWNER, first: 100, orderBy: {direction: DESC, field: STARGAZERS}) { totalCount nodes { stargazers { totalCount } } } } r0: repository(owner: \"rikulo\", name: \"socket.io-client-dart\") { stargazers { totalCount } } r1: repository(owner: \"rikulo\", name: \"socket.io-dart\") { stargazers { totalCount } } r2: repository(owner: \"zkoss\", name: \"zk\") { stargazers { totalCount } } r3: repository(owner: \"zkoss\", name: \"zkidea\") { stargazers { totalCount } } r4: repository(owner: \"zkoss\", name: \"zkthemes\") { stargazers { totalCount } } r5: repository(owner: \"zkoss\", name: \"ztl\") { stargazers { totalCount } } r6: repository(owner: \"zkoss\", name: \"ztltest\") { stargazers { totalCount } } r7: repository(owner: \"zkoss\", name: \"zk-webdriver\") { stargazers { totalCount } } r8: repository(owner: \"zkoss\", name: \"zkckeditor\") { stargazers { totalCount } } r9: repository(owner: \"zkoss\", name: \"zkcalendar\") { stargazers { totalCount } } r10: repository(owner: \"zkoss\", name: \"zk-angular\") { stargazers { totalCount } } }"}'
          R=$(curl -s -H "Authorization: bearer $GH_TOKEN" -d "$Q" https://api.github.com/graphql)
          PRS=$(echo "$R" | jq '.data.user.pullRequests.totalCount')
          ISSUES=$(echo "$R" | jq '.data.user.closedIssues.totalCount')
          REPOS=$(echo "$R" | jq '.data.user.repositories.totalCount')
          FOLLOWERS=$(echo "$R" | jq '.data.user.followers.totalCount')
          OWNSTARS=$(echo "$R" | jq '[.data.user.repositories.nodes[].stargazers.totalCount] | add')
          EXTRASTARS=$(echo "$R" | jq '[.data | to_entries[] | select(.key != "user") | .value.stargazers.totalCount] | add')
          STARS=$((OWNSTARS + EXTRASTARS))
          COMMITS=$(curl -s -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github.cloak-preview" "https://api.github.com/search/commits?q=author:jumperchen&per_page=1" | jq '.total_count')
          F=assets/github-total-bicycle.svg
          sed -i -E "s/Total PRs: [0-9,]+/Total PRs: $PRS/" $F
          sed -i -E "s/Closed Issues: [0-9,]+/Closed Issues: $ISSUES/" $F
          sed -i -E "s/Total Commits: [0-9,]+/Total Commits: $COMMITS/" $F
          sed -i -E "s/Github Repositories: [0-9,]+/Github Repositories: $REPOS/" $F
          sed -i -E "s/Followers: [0-9,]+/Followers: $FOLLOWERS/" $F
          sed -i -E "s/Total Stars Earned: [0-9,]+/Total Stars Earned: $STARS/" $F
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $F
          git diff --cached --quiet || { git commit -m "Update total stats banner - [Skip GitHub Action]"; git pull --rebase; git push; }
